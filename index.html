<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accountability</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #0F0F0F;
      --border: #1C1C1C;
      --border2: #2A2A2A;
      --text: #E2E2DC;
      --muted: #505050;
      --dim: #1A1A1A;
      --accent: #C8FF00;
      --danger: #FF4D4D;
      --warn: #FF8C00;
      --good: #00FFC8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    #header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    #wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
    }

    #header-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-top: 2px;
    }

    #tabs {
      display: flex;
      gap: 6px;
    }

    .tab {
      padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    .tab.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    #score-bar {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #score-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      line-height: 1;
      color: var(--text);
      flex-shrink: 0;
    }

    #score-right { flex: 1; }

    #score-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    #score-track {
      height: 3px;
      background: var(--dim);
      border-radius: 2px;
      position: relative;
    }

    #score-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 0.35s ease;
      width: 0%;
    }

    #target-marker {
      position: absolute;
      top: -4px;
      width: 1px;
      height: 11px;
      background: #333;
    }

    #target-lbl {
      position: absolute;
      top: 10px;
      font-size: 9px;
      color: #333;
      letter-spacing: 0.08em;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .sec-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .week-nav,
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 6px 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--border2);
      color: var(--text);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .danger-btn {
      border-color: #402222;
      color: #a36a6a;
    }

    .danger-btn:hover:not(:disabled) {
      border-color: #6b2d2d;
      color: #d08b8b;
    }

    #week-label {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.05em;
      min-width: 220px;
    }

    .mission-panel,
    .warning-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      padding: 14px 16px;
    }

    .mission-panel {
      border-left: 3px solid var(--accent);
    }

    .warning-panel {
      border-left: 3px solid var(--warn);
    }

    .mission-title,
    .warning-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mission-box {
      background: #0C0C0C;
      border: 1px solid #181818;
      padding: 12px;
    }

    .mission-box-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .mission-box-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
    }

    .mission-box-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    .warning-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .warning-item {
      font-size: 11px;
      line-height: 1.5;
      color: #BEBEB8;
      padding: 8px 10px;
      background: #0C0C0C;
      border-left: 2px solid var(--warn);
    }

    .warning-item.danger {
      border-left-color: var(--danger);
      color: #E0C1C1;
    }

    .warning-item.good {
      border-left-color: var(--good);
      color: #C5E7DD;
    }

    .area-block {
      border: 1px solid var(--border);
      border-left-width: 3px;
      margin-bottom: 8px;
      background: var(--surface);
      animation: fadeUp 0.18s ease both;
    }

    .area-hdr {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .area-hdr:hover { background: #111; }

    .area-left {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .area-icon {
      font-size: 13px;
      width: 18px;
      text-align: center;
    }

    .area-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.09em;
    }

    .area-streak {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.8;
    }

    .area-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .area-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      line-height: 1;
    }

    .area-denom {
      font-size: 10px;
      color: var(--muted);
    }

    .chevron {
      font-size: 9px;
      color: var(--muted);
      margin-left: 4px;
      display: inline-block;
      transition: transform 0.2s;
    }

    .area-block.open .chevron { transform: rotate(180deg); }

    .habits {
      display: none;
      border-top: 1px solid var(--border);
      padding: 10px 16px;
    }

    .area-block.open .habits { display: block; }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #0D0D0D;
    }

    .habit-row:last-child { border-bottom: none; }

    .habit-info {
      flex: 1;
      min-width: 0;
    }

    .habit-name {
      font-size: 12px;
      color: #AAAAAA;
      margin-bottom: 2px;
    }

    .habit-meta {
      font-size: 10px;
      color: var(--muted);
    }

    .habit-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .habit-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #252525;
      min-width: 26px;
      text-align: right;
      transition: color 0.15s;
    }

    .day-dots {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ddot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ddot:hover:not(.future) {
      border-color: var(--muted);
      color: var(--text);
    }

    .ddot.done {
      color: #080808;
      font-weight: 500;
      border-color: transparent;
    }

    .ddot.future {
      opacity: 0.2;
      cursor: default;
    }

    .ddot.today {
      border-style: dashed;
    }

    .wtoggle {
      width: 42px;
      height: 22px;
      border-radius: 11px;
      border: 1.5px solid var(--border2);
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .wtoggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      top: 2px;
      left: 2px;
      transition: all 0.2s;
    }

    .wtoggle.on { border-color: var(--accent); }
    .wtoggle.on::after {
      background: var(--accent);
      transform: translateX(20px);
    }

    .ov-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 24px;
    }

    .ov-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      padding: 14px 16px;
    }

    .ov-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .ov-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 2px;
    }

    .ov-icon {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .ov-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      line-height: 1;
    }

    .ov-max {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: var(--muted);
    }

    .bar-bg {
      height: 2px;
      background: var(--dim);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .bar-fg {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .ov-pct {
      font-size: 10px;
      color: var(--muted);
    }

    .wow-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #0D0D0D;
    }

    .wow-row:last-child { border-bottom: none; }

    .wow-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 190px;
      transition: color 0.15s;
    }

    .wow-row:hover .wow-label { color: var(--text); }

    .wow-bar-wrap { flex: 1; }

    .wow-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      min-width: 54px;
      text-align: right;
    }

    .hist-entry {
      padding: 12px 0;
      border-bottom: 1px solid #0D0D0D;
    }

    .hist-entry:last-child { border-bottom: none; }

    .hist-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hist-date {
      font-size: 11px;
      color: var(--muted);
      min-width: 190px;
      transition: color 0.15s;
    }

    .hist-entry:hover .hist-date { color: var(--text); }

    .hist-bars {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 26px;
      flex: 1;
    }

    .hbar {
      width: 9px;
      border-radius: 1px 1px 0 0;
    }

    .hist-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      min-width: 54px;
      text-align: right;
    }

    .review-wrap { margin-top: 8px; }

    .review-text {
      font-size: 11px;
      color: #555;
      font-style: italic;
      line-height: 1.6;
      padding: 7px 10px;
      background: #0C0C0C;
      border-left: 2px solid #222;
    }

    .review-btn {
      background: transparent;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #2A2A2A;
      cursor: pointer;
      padding: 4px 0 0 0;
      letter-spacing: 0.08em;
      transition: color 0.15s;
      display: block;
    }

    .review-btn:hover { color: var(--muted); }

    .review-input {
      width: 100%;
      background: #0C0C0C;
      border: 1px solid #222;
      border-left: 2px solid var(--accent);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-style: italic;
      padding: 8px 10px;
      resize: none;
      outline: none;
      line-height: 1.6;
      margin-top: 6px;
    }

    .review-input::placeholder {
      color: #252525;
      font-style: italic;
    }

    .review-acts {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .review-save {
      background: var(--accent);
      color: #080808;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      cursor: pointer;
    }

    .review-cancel {
      background: transparent;
      border: 1px solid #222;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent);
      color: #080808;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 10px 20px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      #header {
        padding: 14px 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      #score-bar {
        padding: 14px;
      }

      .ov-grid,
      .stats-strip,
      .mission-grid {
        grid-template-columns: 1fr;
      }

      .wow-row,
      .hist-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .wow-label,
      .hist-date {
        min-width: unset;
      }

      .habit-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .habit-controls {
        width: 100%;
        justify-content: space-between;
      }

      #week-label {
        order: -1;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <div id="wordmark">ACCOUNTABILITY</div>
      <div id="header-sub"></div>
    </div>
    <div id="tabs">
      <button class="tab active" data-tab="week">Week</button>
      <button class="tab" data-tab="overview">Overview</button>
      <button class="tab" data-tab="history">History</button>
    </div>
  </div>

  <div id="score-bar">
    <div id="score-num">0</div>
    <div id="score-right">
      <div id="score-meta">
        <span>WEEKLY SCORE</span>
        <span id="score-max-txt"></span>
      </div>
      <div id="score-track">
        <div id="score-fill"></div>
        <div id="target-marker"></div>
        <div id="target-lbl"></div>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="view-week" class="view active">
      <div class="top-actions">
        <button class="nav-btn" id="export-btn">Export Data</button>
        <button class="nav-btn" id="import-btn">Import Data</button>
        <button class="nav-btn danger-btn" id="reset-btn">Reset All</button>
        <input type="file" id="import-file" accept="application/json" hidden />
      </div>

      <div class="stats-strip">
        <div class="stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value" id="today-score">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Best Week</div>
          <div class="stat-value" id="best-week-score">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">4 Week Avg</div>
          <div class="stat-value" id="avg4-score">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Target</div>
          <div class="stat-value" id="target-score">0</div>
        </div>
      </div>

      <div class="mission-panel">
        <div class="mission-title">Mission standard</div>
        <div class="mission-grid">
          <div class="mission-box">
            <div class="mission-box-label">Current status</div>
            <div class="mission-box-value" id="elite-status">OFF TRACK</div>
            <div class="mission-box-sub" id="elite-sub">Core standards not met</div>
          </div>
          <div class="mission-box">
            <div class="mission-box-label">Non-negotiables hit</div>
            <div class="mission-box-value" id="nn-hit">0/0</div>
            <div class="mission-box-sub">Core habits only</div>
          </div>
          <div class="mission-box">
            <div class="mission-box-label">Elite gate</div>
            <div class="mission-box-value" id="elite-gate">LOCKED</div>
            <div class="mission-box-sub">Needs target + core minimums</div>
          </div>
        </div>
      </div>

      <div class="warning-panel">
        <div class="warning-title">Core warnings</div>
        <div class="warning-list" id="warning-list"></div>
      </div>

      <div class="week-nav">
        <button class="nav-btn" id="btn-prev">← Prev</button>
        <div id="week-label"></div>
        <button class="nav-btn" id="btn-next" disabled>Next →</button>
      </div>

      <div id="areas-container"></div>
    </div>

    <div id="view-overview" class="view">
      <div class="sec-label">This week by area</div>
      <div id="ov-grid" class="ov-grid"></div>

      <div class="sec-label">Week on week</div>
      <div id="wow-list"></div>
    </div>

    <div id="view-history" class="view">
      <div class="sec-label">All weeks</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const STORAGE_KEYS = {
      logs: 'acc_logs_v3',
      reviews: 'acc_reviews_v3'
    };

    const TARGET = 90;
    const DAY_LABELS = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

    const AREAS = [
      {
        id: 'vocational',
        label: 'Vocational',
        icon: '▲',
        color: '#00C8FF',
        habits: [
          { id: 'study', label: '90min study block', type: 'daily', pts: 3 },
          { id: 'examprac', label: 'Attempt one past exam question', type: 'daily', pts: 2 },
          { id: 'network', label: 'One networking action', type: 'weekly', pts: 4 }
        ]
      },
      {
        id: 'physical',
        label: 'Physical',
        icon: '⚡',
        color: '#C8FF00',
        habits: [
          { id: 'physio', label: '20min prescribed physio', type: 'daily', pts: 2 },
          { id: 'sleep', label: '7hrs sleep tracked on phone', type: 'daily', pts: 1 },
          { id: 'upper', label: 'Upper body training session', type: 'weekly', pts: 9 }
        ]
      },
      {
        id: 'financial',
        label: 'Financial',
        icon: '◈',
        color: '#00FFC8',
        habits: [
          { id: 'spendlog', label: 'Weekly spending log completed', type: 'weekly', pts: 10 },
          { id: 'finreview', label: 'Weekly financial review', type: 'weekly', pts: 15 }
        ]
      },
      {
        id: 'spiritual',
        label: 'Spiritual',
        icon: '◎',
        color: '#FF8C00',
        habits: [
          { id: 'goalsrev', label: 'Review goals and values', type: 'weekly', pts: 4 },
          { id: 'reading', label: '20min non-academic reading', type: 'daily', pts: 1 }
        ]
      },
      {
        id: 'social',
        label: 'Social',
        icon: '◉',
        color: '#FF00A8',
        habits: [
          { id: 'friend', label: 'Text or voice note to a close friend', type: 'weekly', pts: 3 },
          { id: 'plans', label: 'Make or keep social plans', type: 'weekly', pts: 3 }
        ]
      },
      {
        id: 'partnerial',
        label: 'Partnerial',
        icon: '♦',
        color: '#A800FF',
        habits: [
          { id: 'quality', label: 'Planned activity together', type: 'weekly', pts: 6 }
        ]
      },
      {
        id: 'familial',
        label: 'Familial',
        icon: '◆',
        color: '#FF2800',
        habits: [
          { id: 'fam', label: 'Check-in message or call', type: 'weekly', pts: 4 }
        ]
      }
    ];

    const NON_NEGOTIABLES = [
      { id: 'study', label: 'Study block', min: 5, unit: 'days' },
      { id: 'examprac', label: 'Past exam question', min: 4, unit: 'days' },
      { id: 'physio', label: 'Physio', min: 5, unit: 'days' },
      { id: 'sleep', label: 'Sleep tracked', min: 6, unit: 'days' },
      { id: 'finreview', label: 'Financial review', min: 1, unit: 'weekly' }
    ];

    const ELITE_RULES = {
      minScore: 90,
      vocationalMin: 24,
      physicalMin: 18,
      financialMin: 15,
      nonNegotiablesRequired: true
    };

    const TOTAL_MAX = getTotalMax();

    let weekOffset = 0;
    let activeTab = 'week';
    const openAreas = {};

    function $(id) { return document.getElementById(id); }

    function getTotalMax() {
      return AREAS.reduce((areaSum, area) => {
        return areaSum + area.habits.reduce((habitSum, habit) => {
          return habitSum + (habit.type === 'daily' ? habit.pts * 7 : habit.pts);
        }, 0);
      }, 0);
    }

    function getAreaMax(area) {
      return area.habits.reduce((sum, habit) => {
        return sum + (habit.type === 'daily' ? habit.pts * 7 : habit.pts);
      }, 0);
    }

    function safeParse(raw, fallback) {
      try { return JSON.parse(raw || JSON.stringify(fallback)); }
      catch { return fallback; }
    }

    function getLogs() { return safeParse(localStorage.getItem(STORAGE_KEYS.logs), {}); }
    function setLogs(data) { localStorage.setItem(STORAGE_KEYS.logs, JSON.stringify(data)); }

    function getReviews() { return safeParse(localStorage.getItem(STORAGE_KEYS.reviews), {}); }
    function setReviews(data) { localStorage.setItem(STORAGE_KEYS.reviews, JSON.stringify(data)); }

    function pad(n) { return n < 10 ? `0${n}` : `${n}`; }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function getISOWeek(d) {
      const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
      const y = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
      return Math.ceil((((t - y) / 86400000) + 1) / 7);
    }

    function weekDays(offset = 0) {
      const d = new Date();
      const dow = d.getDay() || 7;
      d.setDate(d.getDate() - dow + 1 + (offset * 7));

      const days = [];
      for (let i = 0; i < 7; i++) {
        days.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`);
        d.setDate(d.getDate() + 1);
      }
      return days;
    }

    function weekKey(offset = 0) {
      const firstDay = new Date(weekDays(offset)[0]);
      return `${firstDay.getFullYear()}-W${pad(getISOWeek(firstDay))}`;
    }

    function weekLabel(offset = 0) {
      const days = weekDays(offset);
      const fmt = (s) => {
        const [y, m, d] = s.split('-');
        return `${d}/${m}/${y.slice(2)}`;
      };
      const range = `${fmt(days[0])} – ${fmt(days[6])}`;
      if (offset === 0) return `This week · ${range}`;
      if (offset === -1) return `Last week · ${range}`;
      return range;
    }

    function scoreColor(score) {
      if (score >= 100) return '#C8FF00';
      if (score >= 90) return '#00FFC8';
      if (score >= 70) return '#FF8C00';
      return '#E2E2DC';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function hasWeekData(logs, offset) {
      const days = weekDays(offset);
      const wk = weekKey(offset);
      for (const day of days) {
        if (logs[day] && Object.keys(logs[day]).length > 0) return true;
      }
      return !!(logs[wk] && Object.keys(logs[wk]).length > 0);
    }

    function getTodayScore(logs) {
      const today = todayStr();
      let score = 0;
      for (const area of AREAS) {
        for (const habit of area.habits) {
          if (habit.type === 'daily' && logs[today]?.[habit.id]) score += habit.pts;
        }
      }
      return score;
    }

    function weekScore(logs, offset = 0) {
      const days = weekDays(offset);
      const wk = weekKey(offset);
      let total = 0;

      for (const area of AREAS) {
        for (const habit of area.habits) {
          if (habit.type === 'daily') {
            for (const day of days) {
              if (logs[day]?.[habit.id]) total += habit.pts;
            }
          } else {
            if (logs[wk]?.[habit.id]) total += habit.pts;
          }
        }
      }
      return total;
    }

    function areaScore(logs, areaId, offset = 0) {
      const area = AREAS.find(a => a.id === areaId);
      if (!area) return 0;

      const days = weekDays(offset);
      const wk = weekKey(offset);
      let total = 0;

      for (const habit of area.habits) {
        if (habit.type === 'daily') {
          for (const day of days) {
            if (logs[day]?.[habit.id]) total += habit.pts;
          }
        } else {
          if (logs[wk]?.[habit.id]) total += habit.pts;
        }
      }
      return total;
    }

    function habitCountForWeek(logs, habitId, offset = 0) {
      const days = weekDays(offset);
      const wk = weekKey(offset);
      let count = 0;

      let isWeekly = false;
      for (const area of AREAS) {
        const found = area.habits.find(h => h.id === habitId);
        if (found) {
          isWeekly = found.type === 'weekly';
          break;
        }
      }

      if (isWeekly) {
        return logs[wk]?.[habitId] ? 1 : 0;
      }

      for (const day of days) {
        if (logs[day]?.[habitId]) count++;
      }
      return count;
    }

    function getNonNegotiableStatus(logs, offset = 0) {
      const checks = NON_NEGOTIABLES.map(rule => {
        const count = habitCountForWeek(logs, rule.id, offset);
        const met = count >= rule.min;
        return { ...rule, count, met };
      });

      const metCount = checks.filter(c => c.met).length;
      return {
        checks,
        metCount,
        total: checks.length,
        allMet: metCount === checks.length
      };
    }

    function getEliteStatus(logs, offset = 0) {
      const score = weekScore(logs, offset);
      const vocational = areaScore(logs, 'vocational', offset);
      const physical = areaScore(logs, 'physical', offset);
      const financial = areaScore(logs, 'financial', offset);
      const nn = getNonNegotiableStatus(logs, offset);

      const passedScore = score >= ELITE_RULES.minScore;
      const passedVocational = vocational >= ELITE_RULES.vocationalMin;
      const passedPhysical = physical >= ELITE_RULES.physicalMin;
      const passedFinancial = financial >= ELITE_RULES.financialMin;
      const passedNN = ELITE_RULES.nonNegotiablesRequired ? nn.allMet : true;

      const unlocked = passedScore && passedVocational && passedPhysical && passedFinancial && passedNN;

      return {
        unlocked,
        score,
        vocational,
        physical,
        financial,
        nn,
        passedScore,
        passedVocational,
        passedPhysical,
        passedFinancial,
        passedNN
      };
    }

    function streakDays(logs, area) {
      let streak = 0;
      const d = new Date();
      const dailyHabits = area.habits.filter(h => h.type === 'daily');
      if (!dailyHabits.length) return 0;

      for (let i = 0; i < 365; i++) {
        const key = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        const hasAny = dailyHabits.some(h => logs[key]?.[h.id]);
        if (hasAny) {
          streak++;
          d.setDate(d.getDate() - 1);
        } else break;
      }
      return streak;
    }

    function getBestWeekScore(logs) {
      let best = 0;
      for (let w = 0; w >= -51; w--) {
        if (!hasWeekData(logs, w)) continue;
        best = Math.max(best, weekScore(logs, w));
      }
      return best;
    }

    function getRollingAverage(logs, count = 4) {
      const scores = [];
      for (let w = 0; w >= -20 && scores.length < count; w--) {
        if (!hasWeekData(logs, w)) continue;
        scores.push(weekScore(logs, w));
      }
      if (!scores.length) return 0;
      return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
    }

    function updateHeaderMeta(logs) {
      const dailyLogCount = Object.keys(logs).filter(key => !key.includes('-W')).length;
      $('header-sub').textContent = `${todayStr()} · ${dailyLogCount} days logged`;
    }

    function updateScoreBar(score) {
      $('score-num').textContent = score;
      $('score-num').style.color = scoreColor(score);
      $('score-fill').style.width = `${Math.min(score / TOTAL_MAX * 100, 100)}%`;
      $('score-fill').style.background = scoreColor(score);
      $('score-max-txt').textContent = `/ ${TOTAL_MAX}`;
      $('target-marker').style.left = `${TARGET / TOTAL_MAX * 100}%`;
      $('target-lbl').style.left = `${TARGET / TOTAL_MAX * 100}%`;
      $('target-lbl').textContent = TARGET;
    }

    function updateTopStats(logs) {
      $('today-score').textContent = getTodayScore(logs);
      $('best-week-score').textContent = getBestWeekScore(logs);
      $('avg4-score').textContent = getRollingAverage(logs, 4);
      $('target-score').textContent = TARGET;
    }

    function renderMissionPanels(logs) {
      const elite = getEliteStatus(logs, weekOffset);

      $('nn-hit').textContent = `${elite.nn.metCount}/${elite.nn.total}`;

      $('elite-status').textContent = elite.unlocked ? 'ELITE' : 'OFF TRACK';
      $('elite-status').style.color = elite.unlocked ? 'var(--good)' : 'var(--danger)';
      $('elite-sub').textContent = elite.unlocked
        ? 'Target and core standards met'
        : 'Core standards not met';

      $('elite-gate').textContent = elite.unlocked ? 'UNLOCKED' : 'LOCKED';
      $('elite-gate').style.color = elite.unlocked ? 'var(--good)' : 'var(--warn)';

      const warnings = [];

      if (!elite.passedScore) {
        warnings.push({
          type: 'danger',
          text: `Weekly score is ${elite.score}/${TOTAL_MAX}. Elite requires at least ${ELITE_RULES.minScore}.`
        });
      }

      if (!elite.passedVocational) {
        warnings.push({
          type: 'danger',
          text: `Vocational is ${elite.vocational}. Minimum elite standard is ${ELITE_RULES.vocationalMin}.`
        });
      }

      if (!elite.passedPhysical) {
        warnings.push({
          type: 'danger',
          text: `Physical is ${elite.physical}. Minimum elite standard is ${ELITE_RULES.physicalMin}.`
        });
      }

      if (!elite.passedFinancial) {
        warnings.push({
          type: 'danger',
          text: `Financial is ${elite.financial}. Minimum elite standard is ${ELITE_RULES.financialMin}.`
        });
      }

      elite.nn.checks.forEach(check => {
        if (!check.met) {
          warnings.push({
            type: 'warn',
            text: `${check.label}: ${check.count}/${check.min} ${check.unit}. This is a missed non-negotiable.`
          });
        }
      });

      if (warnings.length === 0) {
        warnings.push({
          type: 'good',
          text: 'All current core standards are being met. Keep pressing.'
        });
      }

      const warningList = $('warning-list');
      warningList.innerHTML = warnings.map(w => `
        <div class="warning-item ${w.type}">
          ${w.text}
        </div>
      `).join('');
    }

    function toggleArea(areaId) {
      openAreas[areaId] = !openAreas[areaId];
      renderWeek();
    }

    function toggleDailyHabit(day, habitId) {
      const logs = getLogs();
      if (!logs[day]) logs[day] = {};
      if (logs[day][habitId]) {
        delete logs[day][habitId];
        if (Object.keys(logs[day]).length === 0) delete logs[day];
      } else {
        logs[day][habitId] = true;
      }
      setLogs(logs);
      toast('Saved');
      renderCurrentView();
    }

    function toggleWeeklyHabit(wk, habitId) {
      const logs = getLogs();
      if (!logs[wk]) logs[wk] = {};
      if (logs[wk][habitId]) {
        delete logs[wk][habitId];
        if (Object.keys(logs[wk]).length === 0) delete logs[wk];
      } else {
        logs[wk][habitId] = true;
      }
      setLogs(logs);
      toast('Saved');
      renderCurrentView();
    }

    function renderWeek() {
      const logs = getLogs();
      const days = weekDays(weekOffset);
      const wk = weekKey(weekOffset);
      const today = todayStr();

      updateHeaderMeta(logs);
      updateScoreBar(weekScore(logs, weekOffset));
      updateTopStats(logs);
      renderMissionPanels(logs);

      $('week-label').textContent = weekLabel(weekOffset);
      $('btn-next').disabled = weekOffset >= 0;

      const container = $('areas-container');
      container.innerHTML = '';

      AREAS.forEach((area, index) => {
        const score = areaScore(logs, area.id, weekOffset);
        const max = getAreaMax(area);
        const streak = streakDays(logs, area);
        const isOpen = !!openAreas[area.id];

        const block = document.createElement('div');
        block.className = `area-block${isOpen ? ' open' : ''}`;
        block.style.borderLeftColor = area.color;
        block.style.animationDelay = `${index * 0.03}s`;

        const habitsHtml = area.habits.map(habit => {
          let earned = 0;
          let controls = '';

          if (habit.type === 'daily') {
            let doneCount = 0;
            const dots = days.map((day, di) => {
              const done = !!logs[day]?.[habit.id];
              const isFuture = weekOffset === 0 && day > today;
              const isToday = day === today;
              if (done) doneCount++;

              const classNames = [
                'ddot',
                done ? 'done' : '',
                isFuture ? 'future' : '',
                isToday && !done ? 'today' : ''
              ].filter(Boolean).join(' ');

              const style = done ? `background:${area.color};border-color:${area.color};` : '';

              return `
                <button
                  class="${classNames}"
                  style="${style}"
                  data-action="toggle-daily"
                  data-day="${day}"
                  data-hid="${habit.id}"
                  ${isFuture ? 'disabled' : ''}
                >
                  ${DAY_LABELS[di]}
                </button>
              `;
            }).join('');

            earned = doneCount * habit.pts;
            controls = `<div class="day-dots">${dots}</div>`;
          } else {
            const done = !!logs[wk]?.[habit.id];
            earned = done ? habit.pts : 0;
            controls = `
              <button
                class="wtoggle ${done ? 'on' : ''}"
                data-action="toggle-weekly"
                data-wk="${wk}"
                data-hid="${habit.id}"
              ></button>
            `;
          }

          const meta = habit.type === 'daily'
            ? `${habit.pts}pt × day`
            : `weekly · ${habit.pts}pt`;

          return `
            <div class="habit-row">
              <div class="habit-info">
                <div class="habit-name">${habit.label}</div>
                <div class="habit-meta">${meta}</div>
              </div>
              <div class="habit-controls">
                ${controls}
                <div class="habit-pts" style="color:${earned > 0 ? area.color : '#252525'}">${earned}</div>
              </div>
            </div>
          `;
        }).join('');

        block.innerHTML = `
          <div class="area-hdr" data-action="toggle-area" data-area="${area.id}">
            <div class="area-left">
              <span class="area-icon" style="color:${area.color}">${area.icon}</span>
              <span class="area-name">${area.label.toUpperCase()}</span>
              ${streak > 0 ? `<span class="area-streak" style="color:${area.color}">${streak}d</span>` : ''}
            </div>
            <div class="area-right">
              <span class="area-score" style="color:${score > 0 ? area.color : '#2A2A2A'}">${score}</span>
              <span class="area-denom">/ ${max}</span>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="habits">${habitsHtml}</div>
        `;

        container.appendChild(block);
      });
    }

    function renderOverview() {
      const logs = getLogs();
      updateHeaderMeta(logs);
      updateScoreBar(weekScore(logs, 0));
      updateTopStats(logs);

      const grid = $('ov-grid');
      grid.innerHTML = '';

      AREAS.forEach(area => {
        const pts = areaScore(logs, area.id, 0);
        const max = getAreaMax(area);
        const pct = Math.min((pts / max) * 100, 100);

        const card = document.createElement('div');
        card.className = 'ov-card';
        card.style.borderLeftColor = area.color;
        card.innerHTML = `
          <div class="ov-top">
            <div>
              <div class="ov-icon" style="color:${area.color}">${area.icon}</div>
              <div class="ov-label">${area.label.toUpperCase()}</div>
            </div>
            <div>
              <span class="ov-score" style="color:${pts > 0 ? area.color : '#2A2A2A'}">${pts}</span>
              <span class="ov-max"> /${max}</span>
            </div>
          </div>
          <div class="bar-bg">
            <div class="bar-fg" style="width:${pct}%;background:${area.color}"></div>
          </div>
          <div class="ov-pct">${Math.round(pct)}% of area max</div>
        `;
        grid.appendChild(card);
      });

      const wow = $('wow-list');
      wow.innerHTML = '';
      let found = false;

      for (let w = 0; w >= -11; w--) {
        if (w < 0 && !hasWeekData(logs, w)) continue;
        found = true;
        const score = weekScore(logs, w);
        const color = scoreColor(score);
        const pct = Math.min(score / TOTAL_MAX * 100, 100);

        const row = document.createElement('div');
        row.className = 'wow-row';
        row.innerHTML = `
          <div class="wow-label">${weekLabel(w)}</div>
          <div class="wow-bar-wrap">
            <div class="bar-bg" style="height:3px">
              <div class="bar-fg" style="width:${pct}%;background:${color}"></div>
            </div>
          </div>
          <div class="wow-score" style="color:${color}">
            ${score}<span style="font-size:10px;color:var(--muted)"> /${TOTAL_MAX}</span>
          </div>
        `;
        wow.appendChild(row);
      }

      if (!found) {
        wow.innerHTML = `<div style="color:#2A2A2A;font-size:11px;font-style:italic;padding:14px 0">No history yet</div>`;
      }
    }

    function renderHistory() {
      const logs = getLogs();
      const reviews = getReviews();
      updateHeaderMeta(logs);
      updateScoreBar(weekScore(logs, 0));
      updateTopStats(logs);

      const container = $('hist-list');
      container.innerHTML = '';
      let found = false;

      for (let w = 0; w >= -51; w--) {
        if (!hasWeekData(logs, w)) continue;
        found = true;

        const wk = weekKey(w);
        const score = weekScore(logs, w);
        const color = scoreColor(score);
        const review = reviews[wk] || '';

        const barsHtml = AREAS.map(area => {
          const areaPts = areaScore(logs, area.id, w);
          const areaMax = getAreaMax(area);
          const h = Math.max(2, Math.round((areaPts / areaMax) * 26));
          return `<div class="hbar" style="height:${h}px;background:${area.color};opacity:${areaPts > 0 ? 0.85 : 0.12}" title="${area.label}: ${areaPts}pt"></div>`;
        }).join('');

        const reviewHtml = review
          ? `
            <div class="review-text" id="rt-${wk}">${escHtml(review)}</div>
            <button class="review-btn" data-action="edit-review" data-wk="${wk}">edit note</button>
          `
          : `
            <button class="review-btn" data-action="edit-review" data-wk="${wk}">+ add week note</button>
          `;

        const entry = document.createElement('div');
        entry.className = 'hist-entry';
        entry.innerHTML = `
          <div class="hist-row">
            <div class="hist-date">${weekLabel(w)}</div>
            <div class="hist-bars">${barsHtml}</div>
            <div class="hist-score" style="color:${color}">
              ${score}<span style="font-size:10px;color:var(--muted)"> /${TOTAL_MAX}</span>
            </div>
          </div>
          <div class="review-wrap" id="rw-${wk}">
            ${reviewHtml}
          </div>
        `;
        container.appendChild(entry);
      }

      if (!found) {
        container.innerHTML = `<div style="color:#2A2A2A;font-size:11px;font-style:italic;padding:14px 0">No weeks logged yet</div>`;
      }
    }

    function editReview(wk) {
      const reviews = getReviews();
      const existing = reviews[wk] || '';
      const wrap = $(`rw-${wk}`);
      if (!wrap) return;

      wrap.innerHTML = `
        <textarea class="review-input" id="ri-${wk}" rows="2" placeholder="What drove this score? Travel, illness, exams, off week...">${escHtml(existing)}</textarea>
        <div class="review-acts">
          <button class="review-save" data-action="save-review" data-wk="${wk}">Save</button>
          <button class="review-cancel" data-action="cancel-review">Cancel</button>
        </div>
      `;

      const ta = $(`ri-${wk}`);
      if (ta) {
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
      }
    }

    function saveReview(wk) {
      const ta = $(`ri-${wk}`);
      if (!ta) return;

      const reviews = getReviews();
      const value = ta.value.trim();

      if (value) reviews[wk] = value;
      else delete reviews[wk];

      setReviews(reviews);
      toast('Note saved');
      renderHistory();
    }

    function renderCurrentView() {
      if (activeTab === 'week') renderWeek();
      if (activeTab === 'overview') renderOverview();
      if (activeTab === 'history') renderHistory();
    }

    function switchTab(tabName) {
      activeTab = tabName;
      document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      $(`view-${tabName}`).classList.add('active');
      document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
      renderCurrentView();
    }

    function shiftWeek(dir) {
      weekOffset = Math.min(0, weekOffset + dir);
      renderWeek();
    }

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 1600);
    }

    function exportData() {
      const payload = {
        version: 3,
        exportedAt: new Date().toISOString(),
        logs: getLogs(),
        reviews: getReviews()
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `accountability-backup-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Exported');
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || typeof parsed !== 'object') throw new Error('Invalid file');

          const logs = parsed.logs && typeof parsed.logs === 'object' ? parsed.logs : {};
          const reviews = parsed.reviews && typeof parsed.reviews === 'object' ? parsed.reviews : {};

          setLogs(logs);
          setReviews(reviews);
          toast('Imported');
          renderCurrentView();
        } catch {
          toast('Import failed');
        }
      };
      reader.readAsText(file);
    }

    function resetAllData() {
      const confirmed = window.confirm('Reset all tracker data? This cannot be undone.');
      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEYS.logs);
      localStorage.removeItem(STORAGE_KEYS.reviews);
      toast('All data cleared');
      renderCurrentView();
    }

    function bindStaticEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
      });

      $('btn-prev').addEventListener('click', () => shiftWeek(-1));
      $('btn-next').addEventListener('click', () => shiftWeek(1));

      $('export-btn').addEventListener('click', exportData);
      $('import-btn').addEventListener('click', () => $('import-file').click());
      $('import-file').addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (file) importData(file);
        e.target.value = '';
      });

      $('reset-btn').addEventListener('click', resetAllData);

      document.body.addEventListener('click', (e) => {
        const actionEl = e.target.closest('[data-action]');
        if (!actionEl) return;

        const action = actionEl.dataset.action;

        if (action === 'toggle-area') {
          toggleArea(actionEl.dataset.area);
          return;
        }

        if (action === 'toggle-daily') {
          e.stopPropagation();
          toggleDailyHabit(actionEl.dataset.day, actionEl.dataset.hid);
          return;
        }

        if (action === 'toggle-weekly') {
          e.stopPropagation();
          toggleWeeklyHabit(actionEl.dataset.wk, actionEl.dataset.hid);
          return;
        }

        if (action === 'edit-review') {
          editReview(actionEl.dataset.wk);
          return;
        }

        if (action === 'save-review') {
          saveReview(actionEl.dataset.wk);
          return;
        }

        if (action === 'cancel-review') {
          renderHistory();
        }
      });
    }

    function init() {
      $('score-max-txt').textContent = `/ ${TOTAL_MAX}`;
      $('target-lbl').textContent = TARGET;
      bindStaticEvents();
      renderWeek();
    }

    init();
  </script>
</body>
</html>
